version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hrms_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gauri.1234
      POSTGRES_DB: employee_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/config/migrations.sql:/docker-entrypoint-initdb.d/02_migrations.sql
      - ./src/config/views.sql:/docker-entrypoint-initdb.d/03_views.sql

  backend:
    build: .
    container_name: hrms_backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://postgres:gauri.1234@db:5432/employee_db
      - JWT_SECRET=super_secret_jwt_key_for_students
      - EMAIL_USER=test@example.com
      - EMAIL_PASSWORD=testpassword
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  pgdata:
